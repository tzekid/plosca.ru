name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run css:build
      - run: git diff --exit-code static/style.css
      - run: zig fmt --check build.zig src/main.zig
      - run: zig build test
      - run: zig build -Doptimize=ReleaseFast
      - run: npm run test:visual
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: frontend-visual-artifacts
          path: |
            playwright-report/
            test-results/
            artifacts/css-migration/
          retention-days: 30
