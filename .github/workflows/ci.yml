name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - run: zig build css
      - run: git diff --exit-code static/style.css static/*.html
      - run: zig build check-site
      - run: zig fmt --check build.zig src/main.zig src/tools/site.zig
      - run: zig build test
      - run: zig build -Doptimize=ReleaseFast
      - run: ./scripts/smoke.sh
